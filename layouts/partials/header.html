<header class="top-bar">
  <div class="top-bar-inner">
    <a href="/" class="top-bar-title">
      <span class="top-bar-logo">tom<span class="primary-text">79</span></span>
    </a>

    <nav class="top-bar-nav">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}>
          {{ if eq .Name "Projects" }}<span class="material-icons">apps</span>{{ end }}
          {{ if eq .Name "Blog" }}<span class="material-icons">article</span>{{ end }}
          {{ if eq .Name "Support" }}<span class="material-icons">favorite</span>{{ end }}
          {{ if eq .Name "About" }}<span class="material-icons">person</span>{{ end }}
          <span>{{ .Name }}</span>
        </a>
      {{ end }}

      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <span class="material-icons icon-light">light_mode</span>
        <span class="material-icons icon-dark">dark_mode</span>
      </button>
    </nav>
  </div>
</header>
