<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Holos H Modular - Universal Light Mode (GLOW variant) -->
  <!-- Option 4: Surface glow instead of gradient highlight -->

  <defs>
    <!-- Main block gradient (stronger contrast) -->
    <linearGradient id="blockPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>

    <!-- Secondary blocks (lighter) -->
    <linearGradient id="blockSecondary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>

    <!-- Bridge blocks (distinct color) -->
    <linearGradient id="blockBridge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>

    <!-- Surface glow filter (inner light) -->
    <filter id="surfaceGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur1"/>
      <feFlood flood-color="#FFFFFF" flood-opacity="0.25"/>
      <feComposite in2="blur1" operator="in" result="glow1"/>

      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur2"/>
      <feFlood flood-color="#FFFFFF" flood-opacity="0.15"/>
      <feComposite in2="blur2" operator="in" result="glow2"/>

      <feMerge>
        <feMergeNode in="glow2"/>
        <feMergeNode in="glow1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle shadow (depth) -->
    <filter id="subtleShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Transparent background -->

  <!-- Left vertical column (3 blocks) with surface glow -->
  <rect x="30" y="26" width="34" height="48" rx="8" fill="url(#blockPrimary)" filter="url(#subtleShadow)"/>
  <rect x="30" y="26" width="34" height="48" rx="8" fill="url(#blockPrimary)" filter="url(#surfaceGlow)" opacity="0.6"/>

  <rect x="30" y="78" width="34" height="44" rx="8" fill="url(#blockSecondary)" filter="url(#subtleShadow)"/>
  <rect x="30" y="78" width="34" height="44" rx="8" fill="url(#blockSecondary)" filter="url(#surfaceGlow)" opacity="0.5"/>

  <rect x="30" y="126" width="34" height="48" rx="8" fill="url(#blockPrimary)" filter="url(#subtleShadow)"/>
  <rect x="30" y="126" width="34" height="48" rx="8" fill="url(#blockPrimary)" filter="url(#surfaceGlow)" opacity="0.6"/>

  <!-- Right vertical column (3 blocks) with surface glow -->
  <rect x="136" y="26" width="34" height="48" rx="8" fill="url(#blockPrimary)" filter="url(#subtleShadow)"/>
  <rect x="136" y="26" width="34" height="48" rx="8" fill="url(#blockPrimary)" filter="url(#surfaceGlow)" opacity="0.6"/>

  <rect x="136" y="78" width="34" height="44" rx="8" fill="url(#blockSecondary)" filter="url(#subtleShadow)"/>
  <rect x="136" y="78" width="34" height="44" rx="8" fill="url(#blockSecondary)" filter="url(#surfaceGlow)" opacity="0.5"/>

  <rect x="136" y="126" width="34" height="48" rx="8" fill="url(#blockPrimary)" filter="url(#subtleShadow)"/>
  <rect x="136" y="126" width="34" height="48" rx="8" fill="url(#blockPrimary)" filter="url(#surfaceGlow)" opacity="0.6"/>

  <!-- Horizontal bridge (3 blocks) with surface glow -->
  <rect x="68" y="88" width="22" height="24" rx="7" fill="url(#blockBridge)" filter="url(#subtleShadow)"/>
  <rect x="68" y="88" width="22" height="24" rx="7" fill="url(#blockBridge)" filter="url(#surfaceGlow)" opacity="0.5"/>

  <rect x="92" y="88" width="16" height="24" rx="6" fill="url(#blockPrimary)" filter="url(#subtleShadow)"/>
  <rect x="92" y="88" width="16" height="24" rx="6" fill="url(#blockPrimary)" filter="url(#surfaceGlow)" opacity="0.6"/>

  <rect x="110" y="88" width="22" height="24" rx="7" fill="url(#blockBridge)" filter="url(#subtleShadow)"/>
  <rect x="110" y="88" width="22" height="24" rx="7" fill="url(#blockBridge)" filter="url(#surfaceGlow)" opacity="0.5"/>

  <!-- Key connection points -->
  <circle cx="47" cy="76" r="5" fill="#1E40AF" opacity="0.7"/>
  <circle cx="47" cy="124" r="5" fill="#1E40AF" opacity="0.7"/>
  <circle cx="153" cy="76" r="5" fill="#1E40AF" opacity="0.7"/>
  <circle cx="153" cy="124" r="5" fill="#1E40AF" opacity="0.7"/>
</svg>
